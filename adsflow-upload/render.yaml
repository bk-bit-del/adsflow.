services:
  - type: web
    name: adsflow
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /
    disk:
      name: adsflow-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SQLITE_PATH
        value: /var/data/adsflow.sqlite
      - key: APP_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_REDIRECT_URI
        sync: false
      - key: META_GRAPH_VERSION
        value: v24.0
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ANNUAL_MONTHLY_197
        sync: false
      - key: STRIPE_PRICE_MONTHLY_297
        sync: false
